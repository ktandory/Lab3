<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 3 Web Map</title>
    <!-- Mapbox GL JS script enabling map interactivity and customization-->
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js'></script>
    <!-- Mapbox GL CSS script enabling map styles -->
    <link rel='stylesheet' href='https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css'/>
    <!-- Mapbox geocoder plugin -->
    <script
        src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet"
        href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.css"
        type="text/css">
    <!-- Bootstrap CSS stylesheet link -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!-- Custom CSS stylesheet for webpage display -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Container for heading section using bootstrap to display the title and subtitle -->
    <div class="map-header text-center p-3 mb-2 bg-light">
        <h1 class="h1 mb-1">Cultural Hotspots in Toronto</h1>
        <p class ="h3 mb-0">Insert subtitle here</p>
    </div>

    <!-- Map container -->
    <div id="my-map" class="map-container"></div>

    <!-- Navigation elements -->
     <div class='map-search-container'>
        <label class="option-label" for="geocoder">Search for location</label>
        <div id="geocoder" class="geocoder"></div>
        <button type="button" class="btn btn-primary btn-sm" id="returnbutton">Return to full extent</button>
    </div>

    <!-- Legend -->
    <div id="legend" class="legend">
        <h4>Cultural Hotspots</h4>
        <!-- Legend contents added in JS -->
    </div>

     <!-- Interactivity -->
    <div class="map-data-container">
        <label class="option-label" for="layercheck">Filter map view</label>

        <!-- Checkbox to show/hide layer -->
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="layercheck" checked>
            <label class="form-check-label" for="layercheck">Show hotspots</label>
        </div>

         <!-- Checkbox to show/hide legend -->
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="legendcheck" checked>
            <label class="form-check-label" for="legendcheck">Show legend</label>
        </div>

        <!-- Dropdown to select interest -->
        <form>
            <fieldset id="interestfieldset">
                <label class="option-label" for="interest">Select interest</label>
                <select id="interest" name="interest">
                    <option value="" disabled selected>Select interest...</option>
                    <option value="Architecture">Architecture</option>
                    <option value="Art">Art</option>
                    <option value="Community">Community</option>
                    <option value="Culture">Culture</option>
                    <option value="History">History</option>
                    <option value="Infrastructure">Infrastructure</option>
                    <option value="Mural">Mural</option>
                    <option value="Nature">Nature</option>
                    <option value="All">All</option>
                </select>
            </fieldset>
        </form>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
